version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/webhook
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook
    ports:
      - "5432:5432"